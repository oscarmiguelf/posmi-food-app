name: posmi_food_app
description: PosmiFood — POS para restaurantes y cafeterías
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # HTTP & WebSocket
  dio: ^5.8.0
  web_socket_channel: ^3.0.1
  socket_io_client: ^2.0.3+1

  # Local storage (offline-first)
  drift: ^2.24.0
  drift_flutter: ^0.2.4
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Utilities
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  intl: ^0.20.2
  decimal: ^3.2.1
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4

  # Printing / PDF / WhatsApp
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^10.1.4
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  very_good_analysis: ^9.0.0
  build_runner: ^2.4.15
  drift_dev: ^2.24.0
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
